# Два процесса из одного образа:
#   web — публичный HTTPS-сайт Mini App (то, что грузит Telegram)
#   bot — лёгкий поллер, который только присылает кнопку "Открыть приложение"
#
# Перед запуском поставьте перед web любой reverse-proxy с HTTPS
# (Caddy/Nginx/Traefik) — Telegram Mini App требует HTTPS.
services:
  web:
    build: .
    command: uvicorn webapp.server:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  bot:
    build: .
    command: python3 -m bot.main
    env_file: .env
    restart: unless-stopped
